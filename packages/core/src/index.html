<!doctype html>
<html lang="en" dir="auto">
    <head>
        <!-- Set skeleton theme color properties -->
        <style>
            :root {
                --color-surface-primary: #fff;
                --color-text-primary: #000;
                --initial-loader-display: flex;
            }

            #platform_name:after {
                content: var(--app-shell-platform-name);
                margin-left: 8px;
            }

            .derivatives-trader > .header__loading {
                background-color: var(--color-surface-primary);
                border-bottom: var(--color-surface-primary);
            }

            .derivatives-trader > .app-contents__loading {
                background-color: var(--color-surface-primary);
            }

            .derivatives-trader > .footer__loading {
                background-color: var(--color-surface-primary);
                border-bottom: var(--color-surface-primary);
            }

            .initial-loader {
                display: var(--initial-loader-display) !important;
            }
        </style>
        <!-- Start theme styles and mobile app loader control -->
        <script type="text/javascript">
            var l = window.location;

            // Check URL parameter first (takes priority)
            var urlParams = new URLSearchParams(l.search);
            var themeParam = urlParams.get('theme');

            var ui_store = localStorage.getItem('ui_store');
            var is_dark_theme = false;

            if (themeParam === 'dark') {
                is_dark_theme = true;
            } else if (themeParam === 'light') {
                is_dark_theme = false;
            } else if (ui_store && ui_store.length > 0) {
                // Fallback to localStorage if no URL parameter
                is_dark_theme = JSON.parse(ui_store).is_dark_mode_on || false;
            }

            if (is_dark_theme) {
                // Add dark class to HTML element before React loads
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                // if dark theme, change the property colors for dark theme
                document.documentElement.style.setProperty('--color-surface-primary', '#181c25');
                document.documentElement.style.setProperty('--color-text-primary', '#fff');
            } else {
                // Add light class for light theme
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
            }

            // Hide web app loader when inside native mobile app to prevent double loaders
            var isMobileApp = urlParams.get('is_mobile_app') === 'true';
            if (isMobileApp) {
                document.documentElement.style.setProperty('--initial-loader-display', 'none');
            }
        </script>
        <!-- End theme styles and mobile app loader control -->
        <!-- Start Anti-Clickjack -->
        <style id="antiClickjack">
            body {
                display: none !important;
            }
        </style>
        <script type="text/javascript">
            if (self === top) {
                var antiClickjack = document.getElementById('antiClickjack');
                antiClickjack.parentNode.removeChild(antiClickjack);
            } else {
                top.location = self.location;
            }
        </script>
        <!-- End Anti-Clickjack -->

        <noscript>Your browser does not support JavaScript!</noscript>

        <!-- Start URL Handler -->
        <script type="text/javascript">
            (function (l) {
                if (l.search) {
                    // Create object without prototype to prevent pollution
                    var q = Object.create(null);

                    l.search
                        .slice(1)
                        .split('&')
                        .forEach(function (v) {
                            var a = v.split('=');
                            var key = a[0];

                            // Security checks
                            if (!key || key.length === 0) return;
                            if (key.includes('__proto__')) return;
                            if (key.includes('constructor')) return;
                            if (key.includes('prototype')) return;

                            var value = a.slice(1).join('=').replace(/~and~/g, '&');
                            q[key] = value;
                        });

                    // Use hasOwnProperty equivalent for prototype-less object
                    if (Object.prototype.hasOwnProperty.call(q, 'p')) {
                        window.history.replaceState(
                            null,
                            null,
                            l.pathname.slice(0, -1) +
                                (q.p || '') +
                                (Object.prototype.hasOwnProperty.call(q, 'q') ? '?' + q.q : '') +
                                l.hash
                        );
                    }
                }
            })(window.location);
        </script>
        <!-- End URL Handler -->

        <meta name="description" content="<%= htmlWebpackPlugin.options.templateParameters.platform_description %>" />
        <meta
            name="keywords"
            content=" digital options, forex, forex trading, online trading, financial trading, binary trading, index trading, trading indices, forex trades, trading commodities, digital options strategy, binary broker, binary bet, digital options trading platform, binary strategy, finance, stocks, investment, trading"
        />
        <meta name="author" content="<%= htmlWebpackPlugin.options.templateParameters.brand_name %>" />
        <!-- TODO: iOS zoom bug for input elements means we'll get a lower user accessibility score since we're not allowing dtrader.deriv.com to be scalable on mobile -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="theme-color" content="<%= htmlWebpackPlugin.options.templateParameters.theme_color %>" />
        <meta name="dcterms.rightsHolder" content="<%= htmlWebpackPlugin.options.templateParameters.brand_name %>" />
        <meta name="dcterms.rights" content="<%= htmlWebpackPlugin.options.templateParameters.brand_name %>" />
        <meta
            property="og:description"
            content="<%= htmlWebpackPlugin.options.templateParameters.platform_description %>"
        />
        <meta property="og:title" content="<%= htmlWebpackPlugin.options.templateParameters.platform_name %>" />
        <meta property="og:type" content="website" />
        <meta name="google" content="notranslate" />
        <meta name="referrer" content="origin" />

        <!-- Preconnect for critical resources (establishes early connections) -->
        <link rel="preconnect" href="<%= htmlWebpackPlugin.options.templateParameters.api_core_url %>" />
        <link rel="preconnect" href="<%= htmlWebpackPlugin.options.templateParameters.api_url %>" />
        <link rel="preconnect" href="<%= htmlWebpackPlugin.options.templateParameters.auth_url %>" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- Load all fonts in single request with all required weights and language subsets -->
        <!-- Includes weights: 300,400,500,700 | Subsets: Latin, Cyrillic (Russian), Vietnamese -->
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            onload="
                this.onload = null;
                this.rel = 'stylesheet';
            "
        />

        <!-- Noscript fallback for users with JavaScript disabled -->
        <noscript>
            <link
                rel="stylesheet"
                href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            />
        </noscript>

        <link rel="alternate" hreflang="en" href="<%= htmlWebpackPlugin.options.templateParameters.canonical_url %>" />
        <link rel="canonical" href="<%= htmlWebpackPlugin.options.templateParameters.canonical_url %>" />

        <title>
            <%= htmlWebpackPlugin.options.templateParameters.platform_name %> | <%=
            htmlWebpackPlugin.options.templateParameters.brand_name %>
        </title>
        <meta charset="UTF-8" />
    </head>

    <body class="body theme">
        <div id="derivatives_trader" class="derivatives-trader">
            <div class="sidebar"></div>
            <div class="header"></div>
            <div class="app-contents">
                <div class="initial-loader">
                    <div class="initial-loader__barspinner barspinner barspinner-light">
                        <div class="initial-loader__barspinner--rect barspinner__rect barspinner__rect--1 rect1"></div>
                        <div class="initial-loader__barspinner--rect barspinner__rect barspinner__rect--2 rect2"></div>
                        <div class="initial-loader__barspinner--rect barspinner__rect barspinner__rect--3 rect3"></div>
                        <div class="initial-loader__barspinner--rect barspinner__rect barspinner__rect--4 rect4"></div>
                        <div class="initial-loader__barspinner--rect barspinner__rect barspinner__rect--5 rect5"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="modal_root" class="modal-root"></div>
        <!-- modal_root has background color. So, it cannot be used for toast messages. For those cases popup_root is used -->
        <div id="popup_root" class="popup-root"></div>
    </body>
</html>
